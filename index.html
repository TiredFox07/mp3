<!DOCTYPE>
<html>
  <head>
		<title>Major Project 3</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      nav#primary-nav {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 20rem;
      }

      nav>ul {
        list-style-type: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      nav>ul>li {
        display: flex;
        align-items: center;
        position: relative;
        width: 100%;
        box-sizing: border-box;
        height: 4rem;
        margin: 1rem;
        border-radius: 1rem;
        background-color: purple;
      }

      nav>ul>li>a {
        text-decoration: none;
        font-size: 2rem;
        text-align: center;
        position: absolute;
        box-sizing: border-box;
        width: 100%;
        color: white;
      }

      main {
        position: fixed;
        box-sizing: border-box;
        left: 20rem;
        top: 3rem;
        width: calc(100vw - 40rem);
        padding: 2rem;
      }
    </style>
	</head>
	<body>
    <nav id="primary-nav">
      <ul>
        <li>
          <a href="/">Home</a>
        </li>
      </ul>
    </nav>
    <main>
		<h1>This is my Major Project 3</h1>
		<p>This is a paragraph</p>
    </main>
	</body>
</html>
